<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' file:; script-src 'self' file:; style-src 'self' file: 'unsafe-inline'; img-src 'self' file: data: http: https:; connect-src 'self' file:; object-src 'none'; base-uri 'none';"
    />
    <title>BlockEdit</title>
    <!-- Our plain CSS file - no frameworks, fully readable -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Top application bar -->
    <header id="app-header">
      <div class="header-title">
        <span id="file-name">Untitled (Not saved)</span>
        <span
          id="dirty-indicator"
          class="dirty-dot"
          title="Unsaved changes"
        ></span>
        <span id="save-status" class="save-status" aria-live="polite"></span>
      </div>
      <div class="header-controls">
        <div id="search-control" class="search-control" hidden>
          <button
            id="search-prev"
            class="search-nav-btn"
            type="button"
            title="Previous occurrence"
            aria-label="Previous occurrence"
          ></button>
          <button
            id="search-next"
            class="search-nav-btn"
            type="button"
            title="Next occurrence"
            aria-label="Next occurrence"
          ></button>
          <span id="search-count" class="search-count" aria-live="polite"
            >0 / 0</span
          >
          <div class="search-field">
            <input
              id="search-input"
              type="search"
              placeholder="Search"
              aria-label="Search document"
              autocomplete="off"
            />
            <button
              id="search-case"
              class="search-case-btn"
              type="button"
              title="Match case"
              aria-label="Match case"
              aria-pressed="false"
            ></button>
          </div>
        </div>
        <button
          id="search-btn"
          class="header-btn search-btn"
          type="button"
          title="Search (Ctrl+F)"
          aria-label="Search (Ctrl+F)"
        ></button>
        <button id="btn-new" class="header-btn" title="New File">New</button>
        <button id="btn-open" class="header-btn" title="Open File">Open</button>
        <button id="btn-save" class="header-btn" title="Save (Ctrl+S)">
          Save
        </button>
      </div>
    </header>

    <!-- Main content area where blocks live -->
    <main id="editor-container">
      <div id="blocks-container">
        <!-- Blocks will be dynamically inserted here by BlockManager -->
      </div>
    </main>

    <!-- Dynamic table of contents (popup opened from the floating button) -->
    <aside id="toc-panel" hidden>
      <nav id="toc-list" aria-label="Table of contents"></nav>
    </aside>

    <div
      id="toc-control"
      class="zoom-control"
      aria-label="Table of contents"
      hidden
    >
      <button
        id="toc-btn"
        class="zoom-btn"
        type="button"
        title="Table of contents"
        aria-label="Table of contents"
      ></button>
    </div>

    <div id="theme-control" class="zoom-control" aria-label="Theme controls">
      <button
        id="theme-toggle"
        class="zoom-btn"
        type="button"
        title="Enable dark mode"
        aria-label="Enable dark mode"
      ></button>
    </div>

    <div id="zoom-control" class="zoom-control" aria-label="Page zoom controls">
      <button
        id="zoom-out"
        class="zoom-btn"
        type="button"
        title="Zoom out (Ctrl-)"
        aria-label="Zoom out"
      ></button>
      <span id="zoom-level" class="zoom-level" aria-live="polite">100%</span>
      <button
        id="zoom-in"
        class="zoom-btn"
        type="button"
        title="Zoom in (Ctrl+)"
        aria-label="Zoom in"
      ></button>
    </div>

    <div
      id="history-control"
      class="zoom-control"
      aria-label="Undo and redo controls"
    >
      <button
        id="undo-btn"
        class="zoom-btn"
        type="button"
        title="Undo (Ctrl+Z)"
        aria-label="Undo"
      ></button>
      <button
        id="redo-btn"
        class="zoom-btn"
        type="button"
        title="Redo (Ctrl+Y)"
        aria-label="Redo"
      ></button>
    </div>

    <!-- Load libraries from local node_modules (no CDN required) -->
    <script src="../node_modules/marked/lib/marked.umd.js"></script>
    <script src="../node_modules/dompurify/dist/purify.min.js"></script>
    <script src="../node_modules/diff/dist/diff.js"></script>
    <script src="highlight.js"></script>

    <!-- Module scripts: loaded in order, each exposes a global class/object -->
    <script src="markdownConverter.js"></script>
    <script src="toolbar.js"></script>
    <script src="blockManager.js"></script>
    <script src="searchManager.js"></script>
    <script src="tocManager.js"></script>
    <script src="fileManager.js"></script>
    <script src="app.js"></script>
  </body>
</html>
